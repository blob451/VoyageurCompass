version: '3.8'

services:
  web_blue:
    image: voyageurcompass/backend:${BLUE_VERSION:-latest}
    container_name: voyageur_prod_web_blue
    command: >
      sh -c "
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn VoyageurCompass.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120
      "
    volumes:
      - static_blue:/app/staticfiles
      - media_blue:/app/media
      - ./logs/blue:/app/logs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=VoyageurCompass.settings.production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - DEPLOYMENT_COLOR=blue
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voyageur_prod
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api_blue.rule=Host(`api.voyageurcompass.com`)"
      - "traefik.http.routers.api_blue.tls=true"
      - "traefik.http.services.api_blue.loadbalancer.server.port=8000"

  frontend_blue:
    image: voyageurcompass/frontend:${BLUE_VERSION:-latest}
    container_name: voyageur_prod_frontend_blue
    environment:
      - REACT_APP_API_URL=https://api.voyageurcompass.com
      - REACT_APP_ENVIRONMENT=production
      - DEPLOYMENT_COLOR=blue
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voyageur_prod
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app_blue.rule=Host(`voyageurcompass.com`)"
      - "traefik.http.routers.app_blue.tls=true"
      - "traefik.http.services.app_blue.loadbalancer.server.port=80"

  celery_blue:
    image: voyageurcompass/backend:${BLUE_VERSION:-latest}
    container_name: voyageur_prod_celery_blue
    command: celery -A VoyageurCompass worker -l info --concurrency=4
    volumes:
      - ./logs/blue:/app/logs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=VoyageurCompass.settings.production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - DEPLOYMENT_COLOR=blue
    depends_on:
      - db
      - redis
    networks:
      - voyageur_prod
    restart: unless-stopped

  celery_beat_blue:
    image: voyageurcompass/backend:${BLUE_VERSION:-latest}
    container_name: voyageur_prod_celery_beat_blue
    command: celery -A VoyageurCompass beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./logs/blue:/app/logs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=VoyageurCompass.settings.production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - DEPLOYMENT_COLOR=blue
    depends_on:
      - db
      - redis
    networks:
      - voyageur_prod
    restart: unless-stopped

  # Shared services
  db:
    image: postgres:15-alpine
    container_name: voyageur_prod_db
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./scripts/backup.sh:/scripts/backup.sh:ro
    env_file:
      - .env.production
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.UTF-8
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voyageur_prod
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: voyageur_prod_redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voyageur_prod
    restart: unless-stopped

volumes:
  postgres_prod_data:
    external: true
  redis_prod_data:
    external: true
  static_blue:
  media_blue:

networks:
  voyageur_prod:
    external: true