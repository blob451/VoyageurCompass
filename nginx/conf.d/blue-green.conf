# Blue-Green Deployment Configuration for VoyageurCompass
# This configuration enables zero-downtime deployments

# Blue Backend Configuration
upstream backend_blue {
    least_conn;
    server backend_blue:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Green Backend Configuration  
upstream backend_green {
    least_conn;
    server backend_green:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Frontend Blue Configuration
upstream frontend_blue {
    server frontend_blue:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Frontend Green Configuration
upstream frontend_green {
    server frontend_green:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Map to determine active deployment based on environment variable
# Default to blue if not specified
map $http_x_deployment_target $active_backend {
    default backend_blue;
    blue backend_blue;
    green backend_green;
}

map $http_x_deployment_target $active_frontend {
    default frontend_blue;
    blue frontend_blue;
    green frontend_green;
}

# Health check endpoints for blue-green deployments
server {
    listen 8080;
    server_name localhost;
    
    # Blue backend health check
    location /health/blue/backend {
        proxy_pass http://backend_blue/api/health/;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        access_log off;
    }
    
    # Green backend health check
    location /health/green/backend {
        proxy_pass http://backend_green/api/health/;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        access_log off;
    }
    
    # Blue frontend health check
    location /health/blue/frontend {
        proxy_pass http://frontend_blue/;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        access_log off;
    }
    
    # Green frontend health check
    location /health/green/frontend {
        proxy_pass http://frontend_green/;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        access_log off;
    }
    
    # Deployment status endpoint
    location /deployment/status {
        default_type application/json;
        return 200 '{"active_backend": "$active_backend", "active_frontend": "$active_frontend"}\n';
    }
}