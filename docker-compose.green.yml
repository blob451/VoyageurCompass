version: '3.8'

services:
  web_green:
    image: voyageurcompass/backend:${GREEN_VERSION:-latest}
    container_name: voyageur_prod_web_green
    command: >
      sh -c "
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn VoyageurCompass.wsgi:application --bind 0.0.0.0:8001 --workers 4 --threads 2 --timeout 120
      "
    volumes:
      - static_green:/app/staticfiles
      - media_green:/app/media
      - ./logs/green:/app/logs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=VoyageurCompass.settings.production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - DEPLOYMENT_COLOR=green
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voyageur_prod
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api_green.rule=Host(`api.voyageurcompass.com`)"
      - "traefik.http.routers.api_green.tls=true"
      - "traefik.http.services.api_green.loadbalancer.server.port=8001"

  frontend_green:
    image: voyageurcompass/frontend:${GREEN_VERSION:-latest}
    container_name: voyageur_prod_frontend_green
    environment:
      - REACT_APP_API_URL=https://api.voyageurcompass.com
      - REACT_APP_ENVIRONMENT=production
      - DEPLOYMENT_COLOR=green
    ports:
      - "3002:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voyageur_prod
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app_green.rule=Host(`voyageurcompass.com`)"
      - "traefik.http.routers.app_green.tls=true"
      - "traefik.http.services.app_green.loadbalancer.server.port=80"

  celery_green:
    image: voyageurcompass/backend:${GREEN_VERSION:-latest}
    container_name: voyageur_prod_celery_green
    command: celery -A VoyageurCompass worker -l info --concurrency=4
    volumes:
      - ./logs/green:/app/logs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=VoyageurCompass.settings.production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - DEPLOYMENT_COLOR=green
    depends_on:
      - db
      - redis
    networks:
      - voyageur_prod
    restart: unless-stopped

  celery_beat_green:
    image: voyageurcompass/backend:${GREEN_VERSION:-latest}
    container_name: voyageur_prod_celery_beat_green
    command: celery -A VoyageurCompass beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./logs/green:/app/logs
    env_file:
      - .env.production
    environment:
      - DJANGO_SETTINGS_MODULE=VoyageurCompass.settings.production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - DEPLOYMENT_COLOR=green
    depends_on:
      - db
      - redis
    networks:
      - voyageur_prod
    restart: unless-stopped

volumes:
  static_green:
  media_green:

networks:
  voyageur_prod:
    external: true