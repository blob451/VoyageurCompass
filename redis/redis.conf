# Redis production configuration for VoyageurCompass
# Memory optimization
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Persistence settings
save 900 1      # Save if at least 1 key changes in 900 seconds
save 300 10     # Save if at least 10 keys change in 300 seconds  
save 60 10000   # Save if at least 10000 keys change in 60 seconds

# AOF (Append Only File) settings for durability
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Network settings
timeout 300
tcp-keepalive 300
tcp-backlog 511

# Security settings
protected-mode yes
bind 127.0.0.1

# Performance tuning
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Log settings
loglevel notice
logfile ""

# Database settings
databases 16
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir ./

# Client settings
maxclients 10000

# Slow log settings
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100

# Memory usage optimization
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Advanced settings for production
notify-keyspace-events ""
replica-lazy-flush no
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""