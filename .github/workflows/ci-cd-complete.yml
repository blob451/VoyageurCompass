name: VoyageurCompass Complete CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: 'Deploy to staging environment'
        required: false
        default: 'false'
      deploy_production:
        description: 'Deploy to production environment'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  DJANGO_SETTINGS_MODULE: VoyageurCompass.test_settings
  TEST_FAST_MODE: true
  SECRET_KEY: ${{ secrets.SECRET_KEY || 'test-secret-key-for-ci' }}
  DEBUG: ${{ github.ref != 'refs/heads/main' }}
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Phase 1: Quick validation checks
  quick-checks:
    name: Quick Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for relevant changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only HEAD^ HEAD > changed_files.txt
            if grep -qE '\.(py|js|jsx|ts|tsx|json|yml|yaml)$' changed_files.txt; then
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Set up Python
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Quick syntax check
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          python -m py_compile $(find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*" | head -20)

  # Phase 2: Code Quality Checks (Parallel)
  code-quality:
    name: Code Quality (${{ matrix.tool }})
    needs: quick-checks
    if: needs.quick-checks.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    strategy:
      fail-fast: false
      matrix:
        tool: [black, isort, flake8, bandit]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-quality-${{ matrix.tool }}-${{ hashFiles('requirements*.txt') }}
      
      - name: Install quality tools
        run: |
          pip install --upgrade pip
          pip install ${{ matrix.tool }}
          if [ "${{ matrix.tool }}" == "bandit" ]; then
            pip install bandit[toml]
          fi
      
      - name: Run ${{ matrix.tool }}
        run: |
          case "${{ matrix.tool }}" in
            black)
              black --check --diff .
              ;;
            isort)
              isort --check-only --diff .
              ;;
            flake8)
              flake8 . --statistics --count
              ;;
            bandit)
              bandit -r . -f json -o bandit-report.json || true
              python -m json.tool bandit-report.json
              ;;
          esac
      
      - name: Upload bandit results
        if: matrix.tool == 'bandit'
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # Phase 3: Security Scanning (Enhanced)
  security-scan:
    name: Security Scanning
    needs: quick-checks
    if: needs.quick-checks.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Run Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/django
            p/python
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'VoyageurCompass'
          path: '.'
          format: 'JSON'
          args: >
            --enableRetired
            --enableExperimental
      
      - name: Upload dependency check results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  # Phase 4A: Performance Monitoring
  performance-monitoring:
    name: Performance Analysis
    needs: quick-checks
    if: needs.quick-checks.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_voyageur_compass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          cd Design/frontend && npm install
      
      - name: Build frontend for performance testing
        run: |
          cd Design/frontend
          npm run build
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
      
      - name: Analyze bundle size
        run: |
          cd Design/frontend
          npm run analyze || true
      
      - name: Backend performance profiling
        run: |
          python manage.py establish_performance_baselines || true
      
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            performance_baselines.json
            .lighthouseci/

  # Phase 5.1: Optimized Backend Testing (Performance Enhanced)
  backend-tests:
    name: Backend Tests (Optimized)
    needs: [quick-checks, code-quality]
    if: needs.quick-checks.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8  # Reduced from 20 minutes
    
    # Removed PostgreSQL/Redis services for unit tests (using SQLite in-memory)
    # Services only needed for integration tests
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-optimized-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-optimized-
            ${{ runner.os }}-pip-
      
      - name: Install dependencies with performance tools
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-django pytest-xdist==3.7.0 pytest-benchmark==4.0.0
      
      - name: Run optimized backend tests with parallelization
        run: |
          pytest -n auto --dist=worksteal \
                 --cov=Data --cov=Analytics --cov=Core \
                 --cov-report=xml --cov-report=html \
                 --cov-report=term-missing \
                 --cov-branch \
                 --junit-xml=test-results.xml \
                 --durations=10 \
                 --reuse-db --nomigrations \
                 -v
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: |
            test-results.xml
            htmlcov/
            coverage.xml

  # Phase 5.1: Optimized Frontend Testing
  frontend-tests:
    name: Frontend Tests (Optimized)
    needs: [quick-checks]  # Runs in parallel with backend-tests and code-quality
    if: needs.quick-checks.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 6  # Reduced from 15 minutes
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: Design/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('Design/frontend/package-lock.json') }}
      
      - name: Install dependencies
        run: |
          cd Design/frontend
          npm install
      
      - name: Run linting
        run: |
          cd Design/frontend
          npm run lint
      
      - name: Run tests with coverage
        run: |
          cd Design/frontend
          npm run test:coverage -- --watchAll=false
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./Design/frontend/coverage
          flags: frontend
          name: frontend-coverage
      
      - name: E2E tests
        run: |
          cd Design/frontend
          npm run test:e2e || true

  # Phase 5.1: Optimized Integration Testing (Full Services)
  integration-tests:
    name: Integration Tests (Full Stack)
    needs: [backend-tests, frontend-tests]  # Sequential after optimized unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 12  # Reduced from 25 minutes
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: voyageur_compass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker images
        run: |
          docker-compose build
      
      - name: Run integration tests
        run: |
          docker-compose up -d
          sleep 10
          docker-compose exec -T web python manage.py migrate
          docker-compose exec -T web python manage.py test --parallel
      
      - name: Health check
        run: |
          curl -f http://localhost:8000/api/health/ || exit 1
          curl -f http://localhost:3000 || exit 1
      
      - name: Stop containers
        if: always()
        run: docker-compose down

  # Phase 4A: Quality Dashboard
  quality-dashboard:
    name: Quality Dashboard
    needs: [backend-tests, frontend-tests, security-scan, performance-monitoring]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Install dependencies
        run: |
          pip install jinja2 pyyaml
      
      - name: Generate quality report
        run: |
          python manage.py generate_quality_report \
            --coverage-backend artifacts/backend-test-results/coverage.xml \
            --coverage-frontend artifacts/frontend-coverage/coverage-final.json \
            --security-report artifacts/bandit-report/bandit-report.json \
            --performance-report artifacts/performance-results/performance_baselines.json \
            --output quality-report.html
      
      - name: Upload quality dashboard
        uses: actions/upload-artifact@v4
        with:
          name: quality-dashboard
          path: quality-report.html
      
      - name: Comment PR with quality metrics
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('quality-report.html', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 📊 Quality Report\n\n' + 
                    'View the full [Quality Dashboard](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            });

  # Phase 4B: Build and Push Docker Images
  build-docker:
    name: Build Docker Images
    needs: [backend-tests, frontend-tests, integration-tests]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: voyageurcompass/app
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Design/frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Phase 4B: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    needs: [build-docker, quality-dashboard]
    if: github.ref == 'refs/heads/develop' || github.event.inputs.deploy_staging == 'true'
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}
      
      - name: Deploy to staging server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/voyageurcompass
            docker-compose pull
            docker-compose down
            docker-compose up -d
            docker-compose exec -T web python manage.py migrate --no-input
            docker-compose exec -T web python manage.py collectstatic --no-input
          EOF
      
      - name: Health check
        run: |
          sleep 30
          curl -f https://staging.voyageurcompass.com/api/health/ || exit 1
      
      - name: Run smoke tests
        run: |
          npm install -g newman
          newman run tests/postman/staging-smoke-tests.json \
            --environment tests/postman/staging-env.json

  # Phase 4B: Deploy to Production (Blue-Green)
  deploy-production:
    name: Deploy to Production
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' || github.event.inputs.deploy_production == 'true'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup deployment
        id: deployment
        run: |
          echo "deployment_id=$(date +%s)" >> $GITHUB_OUTPUT
          echo "current_color=blue" >> $GITHUB_OUTPUT
          echo "target_color=green" >> $GITHUB_OUTPUT
      
      - name: Deploy to green environment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/voyageurcompass
            
            # Deploy to green environment
            docker-compose -f docker-compose.green.yml pull
            docker-compose -f docker-compose.green.yml up -d
            
            # Run migrations
            docker-compose -f docker-compose.green.yml exec -T web python manage.py migrate --no-input
            docker-compose -f docker-compose.green.yml exec -T web python manage.py collectstatic --no-input
            
            # Health check green environment
            sleep 30
            curl -f http://localhost:8001/api/health/ || exit 1
      
      - name: Run production tests
        run: |
          npm install -g newman
          newman run tests/postman/production-tests.json \
            --environment tests/postman/green-env.json
      
      - name: Switch traffic to green
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            # Update load balancer to point to green
            sudo nginx -s reload
            
            # Monitor for 5 minutes
            for i in {1..30}; do
              if ! curl -f https://voyageurcompass.com/api/health/; then
                echo "Health check failed, rolling back..."
                sudo nginx -s reload
                exit 1
              fi
              sleep 10
            done
            
            # If successful, stop blue environment
            docker-compose -f docker-compose.blue.yml down
      
      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Production deployment ${{ steps.deployment.outputs.deployment_id }}
            Status: ${{ job.status }}
            Deployed by: ${{ github.actor }}
            Commit: ${{ github.sha }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Phase 4B: Rollback Mechanism
  rollback:
    name: Rollback Deployment
    if: failure() && (needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure')
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ needs.deploy-production.result }}" == "failure" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
      
      - name: Rollback deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ steps.env.outputs.environment == 'production' && secrets.PROD_HOST || secrets.STAGING_HOST }}
          username: ${{ steps.env.outputs.environment == 'production' && secrets.PROD_USER || secrets.STAGING_USER }}
          key: ${{ steps.env.outputs.environment == 'production' && secrets.PROD_SSH_KEY || secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/voyageurcompass
            
            # Rollback to previous version
            docker-compose down
            docker-compose up -d --scale web=0
            
            # Restore from backup
            docker-compose exec -T db psql -U postgres voyageur_compass < /backups/latest.sql
            
            # Start services with previous image
            docker-compose up -d
      
      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "⚠️ Deployment rolled back in ${{ steps.env.outputs.environment }}",
              color: "warning"
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Final Status Report
  pipeline-status:
    name: Pipeline Status Report
    needs: [
      quick-checks,
      code-quality,
      security-scan,
      performance-monitoring,
      backend-tests,
      frontend-tests,
      integration-tests,
      quality-dashboard
    ]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Check overall status
        run: |
          echo "Pipeline Status Summary:"
          echo "Quick Checks: ${{ needs.quick-checks.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Performance: ${{ needs.performance-monitoring.result }}"
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Frontend Tests: ${{ needs.frontend-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Quality Dashboard: ${{ needs.quality-dashboard.result }}"
          
          if [[ "${{ needs.backend-tests.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-tests.result }}" != "success" ]] || \
             [[ "${{ needs.code-quality.result }}" != "success" ]]; then
            echo "❌ Pipeline failed - critical jobs unsuccessful"
            exit 1
          else
            echo "✅ Pipeline passed - all critical jobs successful"
          fi