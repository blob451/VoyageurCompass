name: VoyageurCompass Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Cancel in-progress workflows on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions for security scanning
permissions:
  contents: read
  security-events: write
  actions: read

env:
  # Global environment variables (Performance Optimized)
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'
  DJANGO_SETTINGS_MODULE: VoyageurCompass.test_settings
  TEST_FAST_MODE: true
  SECRET_KEY: test-secret-key-for-ci
  
  # Phase 5.4: Pipeline Metrics & Observability
  PIPELINE_START_TIME: ${{ github.event.created_at }}
  WORKFLOW_ID: ${{ github.run_id }}
  COMMIT_SHA: ${{ github.sha }}
  BRANCH_NAME: ${{ github.ref_name }}
  PIPELINE_VERSION: "5.4.0"
  DEBUG: true
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

jobs:
  # Quick validation job to fail fast on critical issues
  quick-checks:
    runs-on: ubuntu-latest
    outputs:
      should-run-tests: ${{ steps.changes.outputs.should-run }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for relevant changes
      id: changes
      run: |
        if git diff --name-only ${{ github.event.before }}..${{ github.sha }} | grep -E '\.(py|js|jsx|ts|tsx|yml|yaml|json|md)$' > /dev/null; then
          echo "should-run=true" >> $GITHUB_OUTPUT
        else
          echo "should-run=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install minimal dependencies for checks
      run: |
        python -m pip install --upgrade pip
        pip install django==5.2.5

    - name: Quick syntax and import checks
      run: |
        python -m py_compile manage.py
        python -c "import django; print(f'Django version: {django.VERSION}')"

  backend-tests:
    runs-on: ubuntu-latest
    needs: quick-checks
    if: needs.quick-checks.outputs.should-run-tests == 'true'
    timeout-minutes: 8  # Optimized timeout
    
    # Phase 5.1: Removed PostgreSQL/Redis services for unit tests
    # Using SQLite in-memory with test_settings for maximum speed

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies with performance tools
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-django pytest-xdist==3.7.0 pytest-benchmark==4.0.0

    - name: Run Django checks
      run: python manage.py check

    - name: Run optimized backend tests with parallelization
      run: |
        pytest -n auto --dist=worksteal \
               --cov=Data --cov=Analytics --cov=Core \
               --cov-report=xml --cov-report=term-missing \
               --cov-branch --cov-fail-under=36 \
               --durations=10 \
               --reuse-db --nomigrations \
               -v

    - name: Upload backend coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  frontend-tests:
    runs-on: ubuntu-latest
    needs: quick-checks
    if: needs.quick-checks.outputs.should-run-tests == 'true'
    timeout-minutes: 8
    env:
      CI: true
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: Design/frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd Design/frontend
        npm install --prefer-offline --no-audit

    - name: Run frontend linting
      run: |
        cd Design/frontend
        npm run lint

    - name: Run frontend tests with coverage
      run: |
        cd Design/frontend
        npm run test:ci

    - name: Upload frontend coverage
      uses: actions/upload-artifact@v4
      with:
        name: frontend-coverage-tests-workflow
        path: Design/frontend/coverage/
        retention-days: 7

    - name: Upload frontend coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: ./Design/frontend/coverage
        flags: frontend
        name: frontend-coverage-tests
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_voyageur_compass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DJANGO_SETTINGS_MODULE: VoyageurCompass.settings
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_voyageur_compass
      DB_NAME: test_voyageur_compass
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: true
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-django

    - name: Run migrations
      run: python manage.py migrate

    - name: Run integration tests
      run: |
        pytest tests/test_integration.py -v --tb=short

  performance-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: needs.quick-checks.outputs.should-run-tests == 'true'
    timeout-minutes: 15
    
    env:
      DJANGO_SETTINGS_MODULE: VoyageurCompass.performance_test_settings

    # No services needed for frontend performance testing

    steps:
    - uses: actions/checkout@v4

    # Backend Performance Testing
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run database migrations
      run: |
        python manage.py makemigrations --no-input
        python manage.py migrate --no-input

    - name: Establish API performance baselines
      run: |
        python manage.py establish_performance_baselines --runs 5 --output performance_baselines.json --verbose

    - name: Upload performance baselines
      uses: actions/upload-artifact@v4
      with:
        name: performance-baselines
        path: performance_baselines.json
        retention-days: 30

    # Frontend Performance Testing
    - name: Set up Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: Design/frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd Design/frontend
        npm install --prefer-offline --no-audit

    - name: Build frontend for performance testing
      run: |
        cd Design/frontend
        npm run build

    - name: Install Lighthouse CI
      run: npm install -g @lhci/cli@0.12.x

    - name: Run Lighthouse CI
      run: |
        cd Design/frontend
        lhci autorun
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

    - name: Upload Lighthouse results
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-results
        path: Design/frontend/lighthouse-results/
        retention-days: 7

  security-scan:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_voyageur_compass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: VoyageurCompass.settings
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_voyageur_compass
      DB_NAME: test_voyageur_compass
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: false
      SECURE_SSL_REDIRECT: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml] safety semgrep

    # Static Application Security Testing (SAST)
    - name: Run Bandit SAST scan
      run: |
        echo "Running Bandit security scan..."
        if bandit -r . --configfile pyproject.toml; then
          echo "PASS No security issues found"
        else
          exit_code=$?
          echo "WARN Security scan found issues (exit code: $exit_code)"
          echo "This may include low-severity issues that don't block deployment"
          # Only fail if exit code indicates critical issues (not just findings)
          if [ $exit_code -eq 2 ]; then
            echo "FAIL Critical security scan error"
            exit 2
          else
            echo "INFO Security findings reported but not blocking pipeline"
            exit 0
          fi
        fi

    - name: Run Semgrep SAST scan
      run: |
        echo "Running Semgrep security scan..."
        semgrep --config=auto --json --output=semgrep-results.json . || true
        echo "Semgrep scan completed"

    # Dependency vulnerability scanning
    - name: Check Python dependencies for vulnerabilities
      run: |
        echo "Checking Python dependencies for known vulnerabilities..."
        safety check --json --output safety-results.json || true
        echo "Python dependency scan completed"

    - name: Set up Node.js for frontend security scanning
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install npm audit tools
      run: |
        cd Design/frontend
        npm install --prefer-offline --no-audit

    - name: Run npm audit for frontend dependencies
      run: |
        cd Design/frontend
        echo "Checking frontend dependencies for vulnerabilities..."
        npm audit --audit-level=moderate --json > ../npm-audit-results.json || true
        echo "Frontend dependency scan completed"

    # OWASP ZAP Dynamic Application Security Testing (DAST)
    - name: Install backend dependencies for DAST
      run: |
        pip install -r requirements.txt

    - name: Run database migrations for DAST
      run: python manage.py migrate

    - name: Start Django server for DAST
      run: |
        echo "Starting Django server..."
        python manage.py runserver 0.0.0.0:8000 &
        DJANGO_PID=$!
        echo "Django PID: $DJANGO_PID"
        echo $DJANGO_PID > django.pid
        
        # Wait for server to be ready
        echo "Waiting for Django server to start..."
        for i in {1..30}; do
          if curl -f http://localhost:8000/healthz >/dev/null 2>&1; then
            echo "Django server is ready!"
            echo "Testing additional endpoints..."
            curl -f http://localhost:8000/api/v1/health/ >/dev/null 2>&1 && echo "PASS API health endpoint ready"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "Django server failed to start within 30 seconds"
            echo "Debug: Server status check..."
            curl -v http://localhost:8000/healthz || true
            ps aux | grep "runserver" || true
            exit 1
          fi
          echo "Attempt $i/30: Server not ready yet, waiting..."
          sleep 1
        done

    - name: Prepare ZAP scan environment
      run: |
        # Verify Django is still running
        if [ -f django.pid ]; then
          DJANGO_PID=$(cat django.pid)
          if ps -p $DJANGO_PID > /dev/null; then
            echo "PASS Django server is still running (PID: $DJANGO_PID)"
          else
            echo "FAIL Django server stopped. Restarting..."
            python manage.py runserver 0.0.0.0:8000 &
            echo $! > django.pid
            sleep 10
          fi
        fi
        
        # Final connectivity test
        echo "Final connectivity test before ZAP scan..."
        curl -f http://localhost:8000/healthz >/dev/null 2>&1 && echo "PASS Server accessible" || exit 1
        
        # Create ZAP working directory and set permissions
        sudo chmod 755 .
        sudo chmod -R 755 .zap
        ls -la .zap/

    - name: Run OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.12.0
      with:
        target: 'http://localhost:8000/healthz'
        rules_file_name: '.zap/rules.tsv'
        cmd_options: '-a'
        docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
        fail_action: false
        allow_issue_writing: false

    - name: List ZAP scan results
      run: |
        echo "::group::ZAP scan output files"
        ls -la report* || echo "No report files found"
        ls -la *report* || echo "No report files found"  
        ls -la | grep -i zap || echo "No ZAP files found"
        echo "::endgroup::"

    # Container security scanning
    - name: Run Trivy vulnerability scanner (Filesystem)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-fs-results.sarif'

    # Phase 5.4: Container Image Security Scanning  
    - name: Build security test image
      run: |
        echo "::group::Building container for security scanning"
        docker build -t voyageur-security-test:latest .
        echo "::endgroup::"

    - name: Run Trivy container image scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'voyageur-security-test:latest'
        format: 'sarif'
        output: 'trivy-image-results.sarif'

    # Phase 5.4: Secrets Detection Enhancement
    - name: Enhanced secrets scanning
      run: |
        echo "::group::Analyzing Phase 5.4: Enhanced Secrets Detection"
        
        # Install additional secret detection tools
        pip install detect-secrets
        
        # Run comprehensive secrets scan
        echo "Scanning for secrets in codebase..."
        detect-secrets scan --all-files --baseline .secrets.baseline || true
        
        # Check for common secret patterns
        echo "Checking for common credential patterns..."
        if grep -r -E "(password|secret|key|token).*=.*['\"][^'\"]{8,}" . --exclude-dir=.git --exclude="*.md" --exclude-dir=node_modules --exclude-dir=__pycache__ || true; then
          echo "WARN  Potential hardcoded credentials detected - review above matches"
        else
          echo "PASS No obvious hardcoded credentials found"
        fi
        
        # Verify no secrets in environment files
        echo "Security Checking environment file patterns..."
        find . -name "*.env*" -type f -exec echo "Found env file: {}" \;
        
        echo "PASS Secrets scanning completed"
        echo "::endgroup::"

    # Phase 5.4: Security Policy Validation
    - name: Security policy compliance check
      run: |
        echo "::group::Policy Security Policy Compliance Validation"
        
        # Check Docker security best practices
        echo "Container Validating Docker security practices..."
        if grep -q "USER" Dockerfile; then
          echo "PASS Non-root user configured in Dockerfile"
        else
          echo "WARN  Consider adding non-root user to Dockerfile"
        fi
        
        # Check for security headers in Django settings
        echo "Config  Validating Django security configuration..."
        if grep -q "SECURE_" VoyageurCompass/settings.py; then
          echo "PASS Security headers configured"
        else
          echo "WARN  Consider adding security headers configuration"
        fi
        
        # Validate CORS configuration
        if grep -q "CORS_" VoyageurCompass/settings.py; then
          echo "PASS CORS configuration found"
        else
          echo "WARN  CORS configuration may need review"
        fi
        
        echo "Metrics Security compliance check completed"
        echo "::endgroup::"

    # Upload security scan results
    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-scan-results
        path: |
          semgrep-results.json
          safety-results.json
          npm-audit-results.json
          trivy-fs-results.sarif
          trivy-image-results.sarif
          report_html.html
          report_md.md
          report_json.json
        retention-days: 30
        if-no-files-found: warn

    # Upload to GitHub Security tab
    - name: Upload Trivy filesystem scan to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always() && hashFiles('trivy-fs-results.sarif') != ''
      with:
        sarif_file: 'trivy-fs-results.sarif'
        
    - name: Upload Trivy image scan to GitHub Security tab  
      uses: github/codeql-action/upload-sarif@v3
      if: always() && hashFiles('trivy-image-results.sarif') != ''
      with:
        sarif_file: 'trivy-image-results.sarif'

  code-quality:
    runs-on: ubuntu-latest
    needs: quick-checks
    if: needs.quick-checks.outputs.should-run-tests == 'true'
    
    strategy:
      matrix:
        tool: 
          - name: "black"
            command: "black --check --diff ."
            install: "black==25.1.0"
          - name: "isort" 
            command: "isort --check-only --diff ."
            install: "isort==6.0.1"
          - name: "flake8"
            command: "flake8 ."
            install: "flake8==7.1.1"
      fail-fast: false
      max-parallel: 3

    name: "Code Quality (${{ matrix.tool.name }})"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies for ${{ matrix.tool.name }}
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-${{ matrix.tool.name }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.tool.name }}-${{ env.PYTHON_VERSION }}-
          ${{ runner.os }}-${{ matrix.tool.name }}-

    - name: Install ${{ matrix.tool.name }}
      run: |
        python -m pip install --upgrade pip
        pip install ${{ matrix.tool.install }}

    - name: Run ${{ matrix.tool.name }} quality check
      run: |
        echo "::group::${{ matrix.tool.name }} quality check"
        ${{ matrix.tool.command }}
        echo "::endgroup::"

  build-test:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: network=host

    - name: Create CI environment file
      run: |
        cat > .env << 'EOF'
        SECRET_KEY=test-secret-key-for-ci
        DEBUG=false
        ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
        DB_NAME=voyageur_compass_db
        DB_USER=voyageur_user
        DB_PASSWORD=test_password
        DB_HOST=db
        DB_PORT=5432
        REDIS_HOST=redis
        REDIS_PORT=6379
        CELERY_BROKER_URL=redis://redis:6379/1
        CELERY_RESULT_BACKEND=redis://redis:6379/2
        CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
        SECURE_SSL_REDIRECT=false
        SESSION_COOKIE_SECURE=false
        CSRF_COOKIE_SECURE=false
        SECURE_HSTS_SECONDS=0
        LOG_LEVEL=INFO
        APP_ENV=development
        EOF

    - name: Build Docker images with advanced caching
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        target: development
        push: false
        tags: voyageur-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1

    - name: Build Docker Compose stack
      run: |
        # Use pre-built image for compose services
        export DOCKER_BUILDKIT=1
        export COMPOSE_DOCKER_CLI_BUILD=1
        docker compose -f docker-compose.yml build --parallel
        
    - name: Test Docker stack
      run: |
        docker compose -f docker-compose.yml up -d
        sleep 30
        docker compose -f docker-compose.yml ps
        docker compose -f docker-compose.yml logs
        docker compose -f docker-compose.yml down

  # Quality metrics dashboard
  quality-dashboard:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, performance-tests, security-scan, code-quality]
    if: always()
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies for quality report
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download coverage artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-coverage-tests-workflow
        path: Design/frontend/coverage/
      continue-on-error: true

    - name: Download performance baselines
      uses: actions/download-artifact@v4
      with:
        name: performance-baselines
        path: .
      continue-on-error: true

    - name: Download lighthouse results
      uses: actions/download-artifact@v4
      with:
        name: lighthouse-results
        path: Design/frontend/lighthouse-results/
      continue-on-error: true

    - name: Download security scan results
      uses: actions/download-artifact@v4
      with:
        name: security-scan-results
        path: .
      continue-on-error: true

    - name: Generate comprehensive quality report
      run: |
        # Generate both standard and enhanced reports
        python manage.py generate_quality_report --output quality_metrics_report.json --html --verbose
        
        # Phase 5.4: Generate enhanced report with observability features
        python manage.py generate_enhanced_quality_report --output enhanced_quality_report.json --html --include-trends --verbose

    - name: Upload quality dashboard
      uses: actions/upload-artifact@v4
      with:
        name: quality-dashboard
        path: |
          quality_metrics_report.json
          quality_metrics_report.html
          enhanced_quality_report.json
          enhanced_quality_report.html
        retention-days: 30

  # Comprehensive status report
  pipeline-metrics:
    runs-on: ubuntu-latest
    needs: [quick-checks, backend-tests, frontend-tests, integration-tests, performance-tests, security-scan, code-quality, build-test, quality-dashboard]
    if: always()
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Collect Pipeline Metrics
      run: |
        echo "::group::Metrics Phase 5.4: Pipeline Execution Metrics"
        
        # Calculate pipeline execution time
        PIPELINE_END_TIME=$(date +%s)
        PIPELINE_START_UNIX=$(date -d "${{ env.PIPELINE_START_TIME }}" +%s 2>/dev/null || echo $(date +%s))
        PIPELINE_DURATION=$((PIPELINE_END_TIME - PIPELINE_START_UNIX))
        
        # Collect job statuses
        echo "Analyzing Pipeline Execution Analysis:"
        echo "  Pipeline ID: ${{ env.WORKFLOW_ID }}"
        echo "  Commit SHA: ${{ env.COMMIT_SHA }}"
        echo "  Branch: ${{ env.BRANCH_NAME }}"
        echo "  Pipeline Version: ${{ env.PIPELINE_VERSION }}"
        echo "  Total Duration: ${PIPELINE_DURATION}s"
        echo "  Started: ${{ env.PIPELINE_START_TIME }}"
        echo "  Ended: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo ""
        
        # Job execution metrics
        echo "Policy Job Execution Summary:"
        echo "  PASS Quick Checks: ${{ needs.quick-checks.result }}"
        echo "  PASS Backend Tests: ${{ needs.backend-tests.result }}"
        echo "  PASS Frontend Tests: ${{ needs.frontend-tests.result }}"
        echo "  PASS Integration Tests: ${{ needs.integration-tests.result }}"
        echo "  WARN  Performance Tests: ${{ needs.performance-tests.result }}"
        echo "  WARN  Security Scan: ${{ needs.security-scan.result }}"
        echo "  PASS Code Quality: ${{ needs.code-quality.result }}"
        echo "  PASS Build Test: ${{ needs.build-test.result }}"
        echo "  PASS Quality Dashboard: ${{ needs.quality-dashboard.result }}"
        echo ""
        
        # Calculate success metrics
        TOTAL_JOBS=9
        SUCCESSFUL_JOBS=0
        [[ "${{ needs.quick-checks.result }}" == "success" ]] && SUCCESSFUL_JOBS=$((SUCCESSFUL_JOBS + 1))
        [[ "${{ needs.backend-tests.result }}" == "success" ]] && SUCCESSFUL_JOBS=$((SUCCESSFUL_JOBS + 1))
        [[ "${{ needs.frontend-tests.result }}" == "success" ]] && SUCCESSFUL_JOBS=$((SUCCESSFUL_JOBS + 1))
        [[ "${{ needs.integration-tests.result }}" == "success" ]] && SUCCESSFUL_JOBS=$((SUCCESSFUL_JOBS + 1))
        [[ "${{ needs.performance-tests.result }}" == "success" ]] && SUCCESSFUL_JOBS=$((SUCCESSFUL_JOBS + 1))
        [[ "${{ needs.security-scan.result }}" == "success" ]] && SUCCESSFUL_JOBS=$((SUCCESSFUL_JOBS + 1))
        [[ "${{ needs.code-quality.result }}" == "success" ]] && SUCCESSFUL_JOBS=$((SUCCESSFUL_JOBS + 1))
        [[ "${{ needs.build-test.result }}" == "success" ]] && SUCCESSFUL_JOBS=$((SUCCESSFUL_JOBS + 1))
        [[ "${{ needs.quality-dashboard.result }}" == "success" ]] && SUCCESSFUL_JOBS=$((SUCCESSFUL_JOBS + 1))
        
        SUCCESS_RATE=$((SUCCESSFUL_JOBS * 100 / TOTAL_JOBS))
        
        echo "Status Pipeline Performance Metrics:"
        echo "  Success Rate: ${SUCCESS_RATE}% (${SUCCESSFUL_JOBS}/${TOTAL_JOBS} jobs)"
        echo "  Critical Path Status: ${{ needs.backend-tests.result == 'success' && needs.code-quality.result == 'success' && 'PASSED' || 'FAILED' }}"
        echo "  Pipeline Health: ${{ job.status == 'success' && 'HEALTHY' || job.status == 'failure' && 'CRITICAL' || 'WARNING' }}"
        echo ""
        
        # Generate metrics JSON
        cat > pipeline_metrics.json << EOF
        {
          "pipeline_id": "${{ env.WORKFLOW_ID }}",
          "commit_sha": "${{ env.COMMIT_SHA }}",
          "branch": "${{ env.BRANCH_NAME }}",
          "pipeline_version": "${{ env.PIPELINE_VERSION }}",
          "execution_time_seconds": ${PIPELINE_DURATION},
          "started_at": "${{ env.PIPELINE_START_TIME }}",
          "ended_at": "$(date -u '+%Y-%m-%dT%H:%M:%SZ')",
          "success_rate_percent": ${SUCCESS_RATE},
          "total_jobs": ${TOTAL_JOBS},
          "successful_jobs": ${SUCCESSFUL_JOBS},
          "job_results": {
            "quick_checks": "${{ needs.quick-checks.result }}",
            "backend_tests": "${{ needs.backend-tests.result }}",
            "frontend_tests": "${{ needs.frontend-tests.result }}",
            "integration_tests": "${{ needs.integration-tests.result }}",
            "performance_tests": "${{ needs.performance-tests.result }}",
            "security_scan": "${{ needs.security-scan.result }}",
            "code_quality": "${{ needs.code-quality.result }}",
            "build_test": "${{ needs.build-test.result }}",
            "quality_dashboard": "${{ needs.quality-dashboard.result }}"
          }
        }
        EOF
        
        echo "Saved Pipeline metrics saved to pipeline_metrics.json"
        echo "::endgroup::"

    - name: Upload Pipeline Metrics
      uses: actions/upload-artifact@v4
      with:
        name: pipeline-execution-metrics
        path: pipeline_metrics.json
        retention-days: 30

  status-report:
    runs-on: ubuntu-latest
    needs: [quick-checks, backend-tests, frontend-tests, integration-tests, performance-tests, security-scan, code-quality, build-test, quality-dashboard, pipeline-metrics]
    if: always()
    
    steps:
    - uses: actions/checkout@v4

    - name: Download quality dashboard
      uses: actions/download-artifact@v4
      with:
        name: quality-dashboard
        path: .
      continue-on-error: true

    - name: Generate comprehensive status report
      run: |
        echo "::group::Ready VoyageurCompass CI/CD Pipeline Status Report"
        echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        echo "Workflow: ${{ github.workflow }}"
        echo "Run ID: ${{ github.run_id }}"
        echo "Commit: ${{ github.sha }}"
        echo "Branch: ${{ github.ref_name }}"
        echo ""
        
        # Job status summary
        echo "Metrics Job Results:"
        echo "  Quick Checks: ${{ needs.quick-checks.result }}"
        echo "  Backend Tests: ${{ needs.backend-tests.result }}"
        echo "  Frontend Tests: ${{ needs.frontend-tests.result }}"
        echo "  Integration Tests: ${{ needs.integration-tests.result }}"
        echo "  Performance Tests: ${{ needs.performance-tests.result }}"
        echo "  Security Scan: ${{ needs.security-scan.result }}"
        echo "  Code Quality: ${{ needs.code-quality.result }}"
        echo "  Build Test: ${{ needs.build-test.result }}"
        echo "  Quality Dashboard: ${{ needs.quality-dashboard.result }}"
        echo ""
        echo "Status Quality Gates Status:"
        echo "  Performance Monitoring: ${{ needs.performance-tests.result == 'success' && 'PASS Passed' || 'FAIL Failed' }}"
        echo "  Security Compliance: ${{ needs.security-scan.result == 'success' && 'PASS Passed' || 'FAIL Failed' }}"
        echo "  Code Quality Gates: ${{ needs.code-quality.result == 'success' && 'PASS Passed' || 'FAIL Failed' }}"
        echo "  Quality Dashboard: ${{ needs.quality-dashboard.result == 'success' && 'PASS Generated' || 'FAIL Failed' }}"
        echo ""
        
        # Quality metrics summary (if available)
        if [ -f "quality_metrics_report.json" ]; then
          echo "Target Quality Metrics Summary:"
          # Extract key metrics using jq if available, or grep as fallback
          if command -v jq >/dev/null 2>&1; then
            OVERALL_SCORE=$(jq -r '.quality_score.overall_score // "N/A"' quality_metrics_report.json)
            GRADE=$(jq -r '.quality_score.grade // "N/A"' quality_metrics_report.json)
            COVERAGE=$(jq -r '.test_coverage.overall_coverage.percentage // "N/A"' quality_metrics_report.json)
            CODE_ISSUES=$(jq -r '[.code_quality | to_entries[] | select(.value.issues) | .value.issues] | add // 0' quality_metrics_report.json)
            SECURITY_ISSUES=$(jq -r '[.security.bandit_issues | to_entries[] | .value] | add // 0' quality_metrics_report.json)
            
            echo "  Overall Quality Score: ${OVERALL_SCORE}/100 (Grade: ${GRADE})"
            echo "  Test Coverage: ${COVERAGE}%"
            echo "  Code Quality Issues: ${CODE_ISSUES}"
            echo "  Security Issues: ${SECURITY_ISSUES}"
          else
            echo "  Quality report generated (JSON parsing not available)"
          fi
        else
          echo "  Quality metrics: Not available"
        fi
        echo "::endgroup::"

    - name: Check overall success
      run: |
        # Define critical jobs that must pass
        CRITICAL_JOBS=("backend-tests" "code-quality")
        IMPORTANT_JOBS=("frontend-tests" "security-scan" "performance-tests" "quality-dashboard")
        
        CRITICAL_FAILED=false
        IMPORTANT_FAILED=false
        
        # Check critical jobs
        for job in "${CRITICAL_JOBS[@]}"; do
          case $job in
            "backend-tests")
              if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
                echo "FAIL Critical job failed: $job"
                CRITICAL_FAILED=true
              fi
              ;;
            "code-quality")
              if [[ "${{ needs.code-quality.result }}" != "success" ]]; then
                echo "FAIL Critical job failed: $job"
                CRITICAL_FAILED=true
              fi
              ;;
          esac
        done
        
        # Check important jobs
        for job in "${IMPORTANT_JOBS[@]}"; do
          case $job in
            "frontend-tests")
              if [[ "${{ needs.frontend-tests.result }}" != "success" ]]; then
                echo "WARN Important job failed: $job"
                IMPORTANT_FAILED=true
              fi
              ;;
            "security-scan")
              if [[ "${{ needs.security-scan.result }}" != "success" ]]; then
                echo "WARN Important job failed: $job"
                IMPORTANT_FAILED=true
              fi
              ;;
            "performance-tests")
              if [[ "${{ needs.performance-tests.result }}" != "success" ]]; then
                echo "WARN Important job failed: $job"
                IMPORTANT_FAILED=true
              fi
              ;;
            "quality-dashboard")
              if [[ "${{ needs.quality-dashboard.result }}" != "success" ]]; then
                echo "WARN Important job failed: $job"
                IMPORTANT_FAILED=true
              fi
              ;;
          esac
        done
        
        # Final decision
        if [[ "$CRITICAL_FAILED" == "true" ]]; then
          echo ""
          echo "CRITICAL Pipeline FAILED - Critical jobs failed"
          echo "ACTION Action required: Fix critical issues before merging"
          exit 1
        elif [[ "$IMPORTANT_FAILED" == "true" ]]; then
          echo ""
          echo "WARN Pipeline completed with WARNINGS"
          echo "NOTE Recommendation: Address warnings before merging"
          exit 0
        else
          echo ""
          echo "PASS Pipeline PASSED - All checks successful!"
          echo "Ready for merge"
          exit 0
        fi

  notify:
    runs-on: ubuntu-latest
    needs: [status-report, pipeline-metrics]
    if: always()
    
    steps:
    - name: Success notification
      if: needs.status-report.result == 'success'
      run: |
        echo "SUCCESS VoyageurCompass CI/CD Pipeline completed successfully!"
        echo "PASS All quality gates passed"
        echo "Ready Ready for deployment"

    - name: Failure notification
      if: needs.status-report.result == 'failure'
      run: |
        echo "FAIL VoyageurCompass CI/CD Pipeline failed!"
        echo "Analyzing Check the status report for details"
        echo "REPAIR Action required before merge"
        exit 1