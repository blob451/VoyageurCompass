version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: voyageurcompass/backend:staging
    container_name: voyageur_staging_web
    command: >
      sh -c "
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn VoyageurCompass.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 120
      "
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    env_file:
      - .env.staging
    environment:
      - DJANGO_SETTINGS_MODULE=VoyageurCompass.settings.staging
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - voyageur_staging
    restart: unless-stopped

  frontend:
    build:
      context: ./Design/frontend
      dockerfile: Dockerfile
      target: production
    image: voyageurcompass/frontend:staging
    container_name: voyageur_staging_frontend
    volumes:
      - ./Design/frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - REACT_APP_API_URL=https://staging-api.voyageurcompass.com
      - REACT_APP_ENVIRONMENT=staging
    ports:
      - "3001:80"
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voyageur_staging
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: voyageur_staging_db
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./backups:/backups
    env_file:
      - .env.staging
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voyageur_staging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: voyageur_staging_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voyageur_staging
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: voyageurcompass/backend:staging
    container_name: voyageur_staging_celery
    command: celery -A VoyageurCompass worker -l info --concurrency=2
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env.staging
    environment:
      - DJANGO_SETTINGS_MODULE=VoyageurCompass.settings.staging
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis
    networks:
      - voyageur_staging
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: voyageurcompass/backend:staging
    container_name: voyageur_staging_celery_beat
    command: celery -A VoyageurCompass beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env.staging
    environment:
      - DJANGO_SETTINGS_MODULE=VoyageurCompass.settings.staging
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis
    networks:
      - voyageur_staging
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: voyageur_staging_nginx
    volumes:
      - ./nginx/staging.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voyageur_staging
    restart: unless-stopped

volumes:
  postgres_staging_data:
  redis_staging_data:
  static_volume:
  media_volume:

networks:
  voyageur_staging:
    driver: bridge